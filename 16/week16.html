<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тиждень 16</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.151.3/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.151.3/examples/jsm/",
            "mindar-face-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js",
            "@vladmandic/face-api": "https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.esm.js"
        }
    }
    </script>
    <style>
        html, body {
            position: relative;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 14px 22px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            line-height: 1.6;
            pointer-events: none;
            border: 1px solid #ffffff;
        }
        #info-panel span {
            display: block;
        }
        #ar-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            font-size: 22px;
            font-weight: bold;
            white-space: nowrap;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <span id="age">Вік: Завантаження ШІ...</span>
        <span id="gender">Стать: Завантаження ШІ...</span>
    </div>

    <div id="ar-label">Аналіз...</div>

    <script src="./main.js" type="module"></script>
</body>
</html>
